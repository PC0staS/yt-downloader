name: Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            output: youtube-downloader
          - os: windows-latest
            goos: windows
            goarch: amd64
            output: youtube-downloader.exe
          - os: macos-latest
            goos: darwin
            goarch: arm64
            output: youtube-downloader-arm64
          - os: macos-14
            goos: darwin
            goarch: amd64
            output: youtube-downloader-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build frontend
        run: bun install && bun run build
        working-directory: frontend

      - name: Build application (Linux)
        if: runner.os == 'Linux'
        run: wails build -platform linux/${{ matrix.goarch }} -tags webkit2_41

      - name: Rename Linux binary
        if: runner.os == 'Linux'
        run: |
          ls -la build/bin/
          if [ -f build/bin/youtube-downloader ]; then
            mv build/bin/youtube-downloader build/bin/youtube-downloader-linux
          fi

      - name: Build application (Windows)
        if: runner.os == 'Windows'
        run: wails build -platform windows/amd64 -tags webkit2_41

      - name: Rename Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem build\bin\ -Force
          if (Test-Path build\bin\youtube-downloader.exe) {
            Move-Item -Path build\bin\youtube-downloader.exe -Destination build\bin\youtube-downloader-windows.exe
          }

      - name: Build application (macOS)
        if: runner.os == 'macOS'
        run: wails build -platform darwin/${{ matrix.goarch }} -tags webkit2_41

      - name: Compress macOS app (arm64)
        if: runner.os == 'macOS' && matrix.goarch == 'arm64'
        run: |
          cd build/bin
          zip -r youtube-downloader-darwin-arm64.zip youtube-downloader.app
          cd ../..

      - name: Compress macOS app (amd64)
        if: runner.os == 'macOS' && matrix.goarch == 'amd64'
        run: |
          cd build/bin
          zip -r youtube-downloader-darwin-amd64.zip youtube-downloader.app
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            build/bin/youtube-downloader-*
            build/bin/*.zip
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-amd64/youtube-downloader.exe
            linux-amd64/youtube-downloader
            darwin-arm64/youtube-downloader-arm64.zip
            darwin-amd64/youtube-downloader-amd64.zip
